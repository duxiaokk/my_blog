[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".git",
    ".tmp",
    ".tmp_dbinspect",
    ".uv-cache",
    ".uv-cache-local",
    ".uv-python",
    ".venv",
    ".venv_broken_20260420",
    ".venv_uv",
    "__pycache__",
    "alembic",
    "migrations",
    "pytest-cache-files-*",
]

[tool.ruff.lint]
select = ["F", "I"]

